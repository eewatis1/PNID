{% extends "base.html" %}
{% block content %}
    <h2>Керування модулями</h2>
    <div style="margin-bottom: 20px;">
        <input type="text" id="name" placeholder="Назва модуля...">
        <button onclick="save()">Додати</button>
    </div>
    <ul id="list">
        {% for item in items %}
            <li>{{ item[0] }}</li>
        {% endfor %}
    </ul>
    <script>
        function save() {
            const name = document.getElementById('name').value;
            fetch('/api/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name})
            }).then(() => location.reload());
        }
    </script>
{% endblock %}
